name: Build language packs

on:
  release:
    types: [published]
  workflow_dispatch: {}

# softprops/action-gh-release uploads assets via GITHUB_TOKEN, which needs
# write access to repo contents. New repos default to a read-only token, so
# without this block the "Attach to release" step fails with 403 on the
# very first real release -- exactly when it's most annoying to debug.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install "pyyaml>=6,<7"

      - run: python build/build_release.py

      # The build script now self-verifies package contents (no research/
      # leakage, SKILL.md present, everything under the package dir), so a
      # regression in the script itself fails the build here rather than
      # shipping a bad zip to a release.

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip

      - name: Upload as workflow artifact (manual test run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: stop-slop-packages
          path: dist/*.zip
