<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="1200" height="630" rx="16" fill="#f6f3ec" />

  <!-- garland string -->
  <line x1="80" y1="120" x2="1120" y2="410" stroke="#c9c2ae" stroke-width="3" />
  <circle cx="80" cy="120" r="5" fill="#c9c2ae" />
  <circle cx="1120" cy="410" r="5" fill="#c9c2ae" />

  <!-- pennants hanging from the garland, each rotated slightly for a "waving" feel -->
  <!-- EN -->
  <g transform="rotate(-6 225 175)">
    <path d="M 225 175 L 300 175 L 262 268 Z" fill="#3f7fbf" />
    <text x="262" y="205" font-family="system-ui, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">EN</text>
  </g>

  <!-- RU -->
  <g transform="rotate(5 350 210)">
    <path d="M 350 210 L 425 210 L 387 303 Z" fill="#d9634f" />
    <text x="387" y="240" font-family="system-ui, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">RU</text>
  </g>

  <!-- UA -->
  <g transform="rotate(-5 475 245)">
    <path d="M 475 245 L 550 245 L 512 338 Z" fill="#2f9d6b" />
    <text x="512" y="275" font-family="system-ui, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">UA</text>
  </g>

  <!-- BE -->
  <g transform="rotate(6 600 280)">
    <path d="M 600 280 L 675 280 L 637 373 Z" fill="#c98a2c" />
    <text x="637" y="310" font-family="system-ui, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">BE</text>
  </g>

  <!-- BG -->
  <g transform="rotate(-4 725 315)">
    <path d="M 725 315 L 800 315 L 762 408 Z" fill="#6b4c8a" />
    <text x="762" y="345" font-family="system-ui, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">BG</text>
  </g>

  <!-- DE -->
  <g transform="rotate(5 850 350)">
    <path d="M 850 350 L 925 350 L 887 443 Z" fill="#2a9d9d" />
    <text x="887" y="380" font-family="system-ui, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">DE</text>
  </g>

  <!-- one empty dashed pennant left, signaling "more languages welcome" -->
  <g transform="rotate(-6 975 385)">
    <path d="M 975 385 L 1050 385 L 1012 478 Z" fill="none" stroke="#b9b2a0" stroke-width="2" stroke-dasharray="6 6" />
    <text x="1012" y="425" font-family="system-ui, Arial, sans-serif" font-size="24" font-weight="700" fill="#b9b2a0" text-anchor="middle">+</text>
  </g>

  <!-- headline -->
  <text x="80" y="500" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#5b5648">Multilingual extension for the Claude Skill:</text>
  <text x="78" y="545" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="700" fill="#1f2430">Stop Slop, one language pack at a time</text>

  <!-- footer -->
  <line x1="80" y1="580" x2="1120" y2="580" stroke="#d9d3c4" stroke-width="1" />
  <text x="80" y="610" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" fill="#3f7fbf">github.com/Romyleads/stop-slop</text>
  <text x="1120" y="610" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" fill="#8a8371" text-anchor="end">fork of hardikpandya/stop-slop · MIT</text>
</svg>
